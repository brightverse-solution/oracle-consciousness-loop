<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌌%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oracle Workshop · Knowledge Map</title>
    <style>
      html, body, #root {
        margin: 0; padding: 0; height: 100%; background: #0a0a14;
        font-family: "Sarabun", system-ui, sans-serif;
      }
      :root {
        --km3d-text-primary: #e8e8f0;
        --km3d-text-secondary: #a0a0b8;
        --km3d-text-muted: #666680;
        --km3d-accent: #2d5be3;
        --km3d-bg-card: rgba(10, 10, 20, 0.85);
        --km3d-border: rgba(45, 91, 227, 0.3);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse at 30% 20%, rgba(45, 91, 227, 0.15), transparent 50%),
          radial-gradient(ellipse at 70% 80%, rgba(199, 182, 240, 0.1), transparent 50%),
          radial-gradient(ellipse at 50% 50%, rgba(76, 201, 176, 0.05), transparent 70%),
          #0a0a14;
        z-index: -1;
        animation: nebula-drift 30s ease-in-out infinite;
      }
      @keyframes nebula-drift {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.85; transform: scale(1.05); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
